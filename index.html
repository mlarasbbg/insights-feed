<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garden Feed</title>

  <style>
    :root {
      --text: #2f2f2f;
      --muted: #6b6b6b;
      --border: #e5e5e5;
      --link: #254e2b;
      --bg: #ffffff;
      --badge-bg: #f3f4f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 12px 16px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      line-height: 1.4;
    }

    .feed {
      display: flex;
      flex-direction: column;
    }

    .item {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .item:last-child {
      border-bottom: none;
    }

    .thumb {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: #f5f5f5;
    }

    .content {
      flex: 1;
      min-width: 0;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--badge-bg);
      padding: 3px 6px;
      border-radius: 999px;
    }

    .date {
      font-size: 12px;
      color: var(--muted);
    }

    .title {
      display: inline-block;
      font-size: 15px;
      font-weight: 600;
      color: var(--link);
      text-decoration: none;
      margin-bottom: 0;
    }

    .title:hover {
      text-decoration: underline;
    }

    .status,
    .error {
      font-size: 14px;
      color: var(--muted);
      padding: 8px 0;
    }

    .error {
      color: #a1260d;
    }
  </style>
</head>

<body>
  <div id="feed" class="feed">
    <div class="status">Loading latest garden updates...</div>
  </div>

  <script>
    const insightUrl =
      "https://sbbotanicgarden.org/wp-json/wp/v2/insight?per_page=5&_embed";
    const pressUrl =
      "https://sbbotanicgarden.org/wp-json/wp/v2/press?per_page=5&_embed";

    const feedEl = document.getElementById("feed");

    function normalizePost(post, typeLabel) {
      return {
        title: post?.title?.rendered || "Untitled",
        link: post?.link || "#",
        date: post?.date || "",
        type: typeLabel,
        image: post?._embedded?.["wp:featuredmedia"]?.[0]?.source_url || ""
      };
    }

    async function loadFeed() {
      try {
        const [insightResponse, pressResponse] = await Promise.all([
          fetch(insightUrl, { cache: "no-store" }),
          fetch(pressUrl, { cache: "no-store" })
        ]);

        if (!insightResponse.ok) {
          throw new Error(`Insights HTTP ${insightResponse.status}`);
        }

        if (!pressResponse.ok) {
          throw new Error(`Press HTTP ${pressResponse.status}`);
        }

        const [insights, pressReleases] = await Promise.all([
          insightResponse.json(),
          pressResponse.json()
        ]);

        const merged = [
          ...(Array.isArray(insights)
            ? insights.map((post) => normalizePost(post, "Insight"))
            : []),
          ...(Array.isArray(pressReleases)
            ? pressReleases.map((post) => normalizePost(post, "Press Release"))
            : [])
        ].sort((a, b) => new Date(b.date) - new Date(a.date));

        if (merged.length === 0) {
          feedEl.innerHTML = '<div class="status">No updates found.</div>';
          return;
        }

        feedEl.innerHTML = merged
          .map((post) => {
            const safeDate = post.date
              ? new Date(post.date).toLocaleDateString()
              : "";

            return `
              <div class="item">
                ${post.image ? `<img class="thumb" src="${post.image}" alt="${post.type} thumbnail" />` : ""}
                <div class="content">
                  <div class="meta">
                    <span class="badge">${post.type}</span>
                    <span class="date">${safeDate}</span>
                  </div>
                  <a class="title" href="${post.link}" target="_blank" rel="noopener noreferrer">
                    ${post.title}
                  </a>
                </div>
              </div>
            `;
          })
          .join("");
      } catch (error) {
        feedEl.innerHTML =
          '<div class="error">Unable to load updates right now.</div>';
        console.error("Feed load error:", error);
      }
    }

    loadFeed();
  </script>
</body>
</html>

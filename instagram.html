<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBBG Instagram Embed</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    .wrapper {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 12px;
      box-sizing: border-box;
    }

    .note {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-top: 10px;
    }

    .fallback-link {
      display: inline-block;
      margin-top: 8px;
      color: #2d6a4f;
      text-decoration: none;
      font-weight: 600;
    }

    .fallback-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <blockquote
      class="instagram-media"
      data-instgrm-permalink="https://www.instagram.com/sbbotanicgarden/"
      data-instgrm-version="14"
      style="background:#FFF; border:0; border-radius:3px; box-shadow:0 0 1px 0 rgba(0,0,0,0.5),0 1px 10px 0 rgba(0,0,0,0.15); margin:0 auto; max-width:540px; min-width:326px; padding:0; width:100%;"
    >
      <div style="padding:16px;">
        <a
          href="https://www.instagram.com/sbbotanicgarden/"
          target="_blank"
          rel="noopener noreferrer"
          style="background:#FFFFFF; line-height:0; padding:0; text-align:center; text-decoration:none; width:100%;"
        >
          View this profile on Instagram
        </a>
      </div>
    </blockquote>

    <div class="note">
      If the embedded preview does not load in SharePoint,
      <br />
      <a
        class="fallback-link"
        href="https://www.instagram.com/sbbotanicgarden/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Open SBBG Instagram
      </a>
    </div>
  </div>

  <script async src="https://www.instagram.com/embed.js"></script>
</body>
</html>
